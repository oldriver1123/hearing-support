<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>会話サポート</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  #app {
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  }

  /* ===== 設定画面 ===== */
  #settings-screen {
    width: 100%; height: 100%;
    background: #f0ede6;
    display: flex; align-items: center; justify-content: center;
  }
  #settings-card {
    background: #fff; border-radius: 16px;
    padding: 40px 48px; width: 480px;
    box-shadow: 0 2px 16px rgba(0,0,0,.08);
  }
  #settings-card h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
  #settings-card p  { font-size: 13px; color: #aaa; margin-bottom: 28px; line-height: 1.7; }
  .field-label { font-size: 12px; color: #888; margin-bottom: 6px; letter-spacing: .04em; }
  #key-input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1px solid #ddd; font-size: 14px; font-family: monospace;
    color: #333; outline: none; margin-bottom: 6px;
  }
  #key-input:focus { border-color: #aaa; }
  #key-hint { font-size: 12px; color: #bbb; margin-bottom: 28px; min-height: 18px; }
  #start-btn {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    background: #1D9E75; color: #fff; font-size: 16px; font-weight: 500;
    cursor: pointer; transition: background .2s;
  }
  #start-btn:hover    { background: #0F6E56; }
  #start-btn:disabled { background: #ccc; cursor: default; }
  #skip-btn {
    display: block; text-align: center; margin-top: 14px;
    font-size: 13px; color: #aaa; cursor: pointer; text-decoration: underline;
  }

  /* ===== メイン画面 ===== */
  #main-screen { width: 100%; height: 100%; display: none; flex-direction: column; }

  #bar {
    background: #e8e4dc; padding: 7px 20px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #d8d4cc; flex-shrink: 0;
  }
  #bar-left { display: flex; align-items: center; gap: 10px; }
  #bar-title { font-size: 13px; color: #888; }
  #settings-icon {
    font-size: 16px; cursor: pointer; color: #aaa;
    padding: 2px 6px; border-radius: 6px;
    transition: background .15s; user-select: none;
  }
  #settings-icon:hover { background: rgba(0,0,0,.06); }
  #status-wrap { display: flex; align-items: center; gap: 8px; }
  #dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: #bbb; transition: background .3s;
  }
  #dot.active      { background: #1D9E75; }
  #dot.speaking    { background: #1D9E75; animation: pulse .6s ease-in-out infinite; }
  #dot.summarizing { background: #BA7517; animation: pulse .4s ease-in-out infinite; }
  #dot.error       { background: #E24B4A; }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%     { opacity:.5; transform:scale(1.4); }
  }
  #status-text { font-size: 13px; color: #888; }

  #indicator-bar { height: 3px; background: #d8d4cc; flex-shrink: 0; overflow: hidden; }
  #indicator-fill {
    height: 100%; width: 0%; background: #1D9E75;
    border-radius: 0 2px 2px 0; transition: width .12s ease-out;
  }

  /* 要約エリア */
  #top {
    flex: 1; padding: 24px 40px 18px;
    border-bottom: 1px solid #d8d4cc;
    display: flex; flex-direction: column; justify-content: flex-start;
    min-height: 0; background: #f5f1e8;
  }

  #type-badge {
    font-size: 11px; font-weight: 500;
    padding: 2px 10px; border-radius: 10px;
    display: inline-block; margin-bottom: 12px;
    opacity: 0; transition: opacity .3s; align-self: flex-start;
  }
  #type-badge.show     { opacity: 1; }
  #type-badge.question { background: #E1F5EE; color: #085041; }
  #type-badge.summary  { background: #EEEDFE; color: #3C3489; }
  #type-badge.short    { background: #F1EFE8; color: #5F5E5A; }

  #summary {
    font-size: 48px; font-weight: 400; line-height: 1.5;
    color: #1a1a1a; transition: opacity .2s; word-break: break-all;
  }
  #summary b           { font-weight: 700; font-size: 54px; color: #1a1a1a; }
  #summary.fading      { opacity: .3; }
  #summary.placeholder { color: #bbb; font-size: 28px; font-weight: 400; }

  /* 要約中アニメーション */
  #summary.processing  { color: #BA7517; font-size: 32px; font-weight: 400; }
  @keyframes ellipsis {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }
  #summary.processing::after {
    content: '';
    animation: ellipsis 1.2s steps(1) infinite;
  }

  /* 全文エリア */
  #bottom {
    flex: 0 0 30%; padding: 14px 40px 18px;
    background: #ede9e0; display: flex; flex-direction: column; min-height: 0;
  }
  #full-label {
    font-size: 12px; color: #999; margin-bottom: 8px;
    letter-spacing: .06em; flex-shrink: 0;
  }
  #transcript-wrap {
    flex: 1; overflow: hidden;
    display: flex; flex-direction: column; justify-content: flex-start;
  }
  #transcript { font-size: 20px; color: #1a1a1a; line-height: 1.8; }
  #interim    { font-size: 20px; color: #999;    line-height: 1.8; }
</style>
</head>
<body>

<div id="settings-screen">
  <div id="settings-card">
    <h1>会話サポート</h1>
    <p>Anthropic APIキーを入力して開始してください。<br>キーは端末内にのみ保存されます。</p>
    <div class="field-label">Anthropic API Key</div>
    <input id="key-input" type="password" placeholder="sk-ant-…" autocomplete="off"/>
    <div id="key-hint"></div>
    <button id="start-btn" disabled>開始する</button>
    <span id="skip-btn">キーなしで試す（要約はルールベース）</span>
  </div>
</div>

<div id="main-screen">
  <div id="bar">
    <div id="bar-left">
      <span id="bar-title">会話サポート</span>
      <span id="settings-icon" title="設定">⚙</span>
    </div>
    <div id="status-wrap">
      <div id="dot"></div>
      <span id="status-text">準備中…</span>
    </div>
  </div>
  <div id="indicator-bar"><div id="indicator-fill"></div></div>

  <div id="top">
    <div id="type-badge"></div>
    <div id="summary" class="placeholder">話しかけてください</div>
  </div>
  <div id="bottom">
    <div id="full-label">全文</div>
    <div id="transcript-wrap">
      <div id="transcript"></div>
      <div id="interim"></div>
    </div>
  </div>
</div>

<script>
const settingsScreen = document.getElementById('settings-screen');
const mainScreen     = document.getElementById('main-screen');
const keyInput       = document.getElementById('key-input');
const keyHint        = document.getElementById('key-hint');
const startBtn       = document.getElementById('start-btn');
const skipBtn        = document.getElementById('skip-btn');
const settingsIcon   = document.getElementById('settings-icon');
const dot            = document.getElementById('dot');
const statusText     = document.getElementById('status-text');
const typeBadge      = document.getElementById('type-badge');
const summaryEl      = document.getElementById('summary');
const transcriptEl   = document.getElementById('transcript');
const interimEl      = document.getElementById('interim');
const indicatorFill  = document.getElementById('indicator-fill');

const SILENCE_MS  = 900;
const STORAGE_KEY = 'hearing_support_api_key';

const KEYWORDS = [
  '病院','薬','今日','明日','昨日','何時','どこ','誰','先生',
  '準備','出かける','一緒','帰る','電話','食事','朝','昼','夜',
  '忘れ','来る','行く','買い物'
];

const BADGE_LABEL = { question: '疑問', summary: '要約', short: 'そのまま' };
const BADGE_CLASS = { question: 'question', summary: 'summary', short: 'short' };

let recognition  = null;
let silenceTimer = null;
let levelTimer   = null;
let currentFinal = '';
let isRunning    = false;
let isSpeaking   = false;
let apiKey       = '';

/* キー読み込み */
const savedKey = localStorage.getItem(STORAGE_KEY);
if (savedKey) { keyInput.value = savedKey; validateKey(savedKey); }

function validateKey(v) {
  if (v.startsWith('sk-ant-') && v.length > 20) {
    apiKey = v;
    keyHint.textContent = '✓ 有効なキーです';
    keyHint.style.color = '#1D9E75';
    startBtn.disabled = false;
  } else if (v.length > 0) {
    apiKey = '';
    keyHint.textContent = 'sk-ant- から始まるキーを入力してください';
    keyHint.style.color = '#E24B4A';
    startBtn.disabled = true;
  } else {
    apiKey = '';
    keyHint.textContent = '';
    startBtn.disabled = true;
  }
}

keyInput.addEventListener('input', () => validateKey(keyInput.value.trim()));
startBtn.addEventListener('click', () => {
  localStorage.setItem(STORAGE_KEY, apiKey);
  showMain();
});
skipBtn.addEventListener('click', () => { apiKey = ''; showMain(); });
settingsIcon.addEventListener('click', () => {
  stopRecognition();
  mainScreen.style.display = 'none';
  settingsScreen.style.display = 'flex';
});

function showMain() {
  settingsScreen.style.display = 'none';
  mainScreen.style.display = 'flex';
  startRecognition();
}

/* 音量インジケーター */
function setLevel(active) {
  if (active === isSpeaking) return;
  isSpeaking = active;
  if (active) {
    dot.className = 'speaking';
    statusText.textContent = '話し中';
    animateLevel();
  } else {
    if (dot.className !== 'summarizing') dot.className = 'active';
    statusText.textContent = '認識中';
    clearTimeout(levelTimer);
    indicatorFill.style.width = '0%';
  }
}
function animateLevel() {
  if (!isSpeaking) return;
  indicatorFill.style.width = (30 + Math.random() * 65) + '%';
  levelTimer = setTimeout(animateLevel, 120);
}

/* キーワード強調 */
function highlight(text) {
  let r = text;
  KEYWORDS.forEach(k => { if (r.includes(k)) r = r.replaceAll(k, `<b>${k}</b>`); });
  return r;
}

/* 要約中の表示 */
function showProcessing() {
  typeBadge.className = '';
  summaryEl.className = 'processing';
  summaryEl.innerHTML = '考えています';
  dot.className = 'summarizing';
  statusText.textContent = '要約中…';
}

/* 結果を反映 */
function showResult(type, html) {
  typeBadge.textContent = BADGE_LABEL[type] || '';
  typeBadge.className = `show ${BADGE_CLASS[type] || ''}`;
  summaryEl.className = '';
  summaryEl.innerHTML = html;
  dot.className = 'active';
  statusText.textContent = '認識中';
}

/* Claude API — 発言種別判定＋要約 */
async function analyzeWithClaude(text) {
  const prompt = `以下の日本語の発言を分析し、JSONのみ返してください。マークダウンや説明文は不要です。

ルール：
- 疑問文（？で終わる、または問いかけ） → {"type":"question","text":"原文そのまま"}
- 10文字以下、または相槌・擬音のみ（そうだね、うん、えーと、あのね など） → {"type":"skip"}
- それ以外 → {"type":"summary","text":"15文字以内の要約。固有名詞・数字・行動を優先。"}

発言：「${text}」`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 120,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    if (!data.content || !data.content[0]) return null;
    const raw = data.content[0].text.trim();
    const m = raw.match(/\{[\s\S]*?\}/);
    if (!m) return null;
    return JSON.parse(m[0]);
  } catch (e) {
    return null;
  }
}

/* フォールバック（APIなし） */
function fallback(text) {
  const s = text.trim();
  if (s.length <= 10) return { type: 'short', text: s };
  if (s.endsWith('？') || s.endsWith('?')) return { type: 'question', text: s };
  const m = s.match(/^(.{4,20})[。！？]/);
  const summary = m ? m[1] : s.slice(0, 18) + (s.length > 18 ? '…' : '');
  return { type: 'summary', text: summary };
}

/* 無音後の処理 */
async function onSilence() {
  if (!currentFinal.trim()) return;
  const text = currentFinal;
  currentFinal = '';
  transcriptEl.textContent = text;
  interimEl.textContent = '';
  setLevel(false);

  showProcessing();

  let result = null;
  if (apiKey) result = await analyzeWithClaude(text);
  if (!result) result = fallback(text);

  if (result.type === 'skip') {
    summaryEl.className = '';
    summaryEl.innerHTML = '';
    typeBadge.className = '';
    dot.className = 'active';
    statusText.textContent = '認識中';
    return;
  }

  showResult(result.type, highlight(result.text));
}

function resetSilenceTimer() {
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(onSilence, SILENCE_MS);
}

/* 音声認識 */
function stopRecognition() {
  isRunning = false;
  if (recognition) { recognition.onend = null; recognition.stop(); recognition = null; }
  setLevel(false);
}

function startRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    summaryEl.className = '';
    summaryEl.style.color = '#E24B4A';
    summaryEl.style.fontSize = '22px';
    summaryEl.textContent = 'Chromeをお使いください';
    dot.className = 'error';
    statusText.textContent = '未対応';
    return;
  }

  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.continuous = true;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    dot.className = 'active';
    statusText.textContent = '認識中';
    isRunning = true;
  };

  recognition.onresult = (e) => {
    let interim = '';
    let finalChunk = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) finalChunk += t;
      else interim += t;
    }
    if (interim || finalChunk) setLevel(true);
    if (finalChunk) {
      currentFinal += finalChunk;
      transcriptEl.textContent = currentFinal;
      resetSilenceTimer();
    }
    interimEl.textContent = interim;
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') { setLevel(false); return; }
    if (e.error === 'not-allowed') {
      dot.className = 'error';
      statusText.textContent = 'マイク未許可';
      summaryEl.className = '';
      summaryEl.style.color = '#E24B4A';
      summaryEl.style.fontSize = '24px';
      summaryEl.textContent = 'マイクのアクセスを許可してください';
    }
  };

  recognition.onend = () => {
    setLevel(false);
    if (isRunning) setTimeout(() => recognition && recognition.start(), 200);
  };

  recognition.start();
}
</script>
</body>
</html>
